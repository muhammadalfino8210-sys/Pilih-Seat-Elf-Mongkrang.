<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Booking Seat ELF Mongkrang</title>

<style>

body{
    margin:0;
    padding:20px;
    background:#f2f2f2;
    font-family:Arial,sans-serif;

    display:flex;
    flex-direction:column;
    align-items:center;
}

h1{
    text-align:center;
    margin-bottom:10px;
}

p{
    text-align:center;
    color:#666;
}

input{
    padding:12px;
    width:240px;
    border-radius:12px;
    border:1px solid #ccc;
    font-size:15px;
}

button{
    margin-top:10px;
    padding:12px 20px;
    border:none;
    border-radius:12px;
    background:#0d6efd;
    color:white;
    font-size:15px;
    cursor:pointer;
}

.info{
    margin-top:10px;
    color:#666;
    font-size:14px;
}

/* ====================== */
/* BUS */
/* ====================== */

.bus{
    margin-top:30px;
    background:white;
    border:8px solid #2f2bbd;
    border-radius:40px;
    padding:25px 15px;
    width:95%;
    max-width:700px;
    box-sizing:border-box;
}

.front{
    text-align:center;
    font-size:30px;
    font-weight:bold;
    margin-bottom:25px;
    color:#444;
}

.row{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:12px;
    margin-bottom:14px;
}

/* KURSI */

.seat{
    width:72px;
    height:72px;
    background:#1d39c4;
    color:white;
    border-radius:16px;

    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;

    font-size:12px;
    cursor:pointer;

    transition:0.2s;

    padding:4px;
    box-sizing:border-box;

    word-break:break-word;
}

.seat:hover{
    transform:scale(1.05);
}

/* SUPIR */

.driver{
    width:156px;
    background:#ffd43b;
    color:black;
    font-weight:bold;
    cursor:default;
}

/* STATUS */

.booked{
    background:#ff5a5a;
}

.mine{
    background:#28a745;
    animation:glow 1s infinite alternate;
}

@keyframes glow{

    from{
        box-shadow:0 0 5px #28a745;
    }

    to{
        box-shadow:0 0 18px #28a745;
    }

}

/* KOSONG */

.empty{
    width:72px;
    height:72px;
    opacity:0;
}

/* LEGEND */

.legend{
    margin-top:20px;
    text-align:center;
}

.dot{
    width:14px;
    height:14px;
    border-radius:50%;
    display:inline-block;
    margin-right:5px;
}

.blue{
    background:#1d39c4;
}

.red{
    background:#ff5a5a;
}

.green{
    background:#28a745;
}

/* MOBILE */

@media(max-width:500px){

    .seat{
        width:60px;
        height:60px;
        font-size:11px;
    }

    .driver{
        width:132px;
    }

    .empty{
        width:60px;
        height:60px;
    }

    .row{
        gap:8px;
    }

}

</style>
</head>

<body>

<h1>BOOKING SEAT ELF MONGKRANG</h1>

<p>Pilih kursi sebelum keberangkatan</p>

<input type="text" id="nameInput" placeholder="Masukkan nama panggilan">

<br>

<button onclick="saveName()">
Simpan Nama
</button>

<div class="info">
1 orang hanya bisa memilih 1 kursi
</div>

<!-- ====================== -->
<!-- DENAH -->
<!-- ====================== -->

<div class="bus">

<div class="front">
DEPAN
</div>

<!-- BARIS 1 -->
<div class="row">

    <div class="seat" id="seat-1" onclick="bookSeat(1)">1</div>

    <div class="seat" id="seat-2" onclick="bookSeat(2)">2</div>

    <div class="seat driver">
        SUPIR
    </div>

</div>

<!-- BARIS 2 -->
<div class="row">

    <div class="empty"></div>

    <div class="seat" id="seat-3" onclick="bookSeat(3)">3</div>

    <div class="seat" id="seat-4" onclick="bookSeat(4)">4</div>

    <div class="seat" id="seat-5" onclick="bookSeat(5)">5</div>

</div>

<!-- BARIS 3 -->
<div class="row">

    <div class="seat" id="seat-6" onclick="bookSeat(6)">6</div>

    <div class="seat" id="seat-7" onclick="bookSeat(7)">7</div>

    <div class="seat" id="seat-8" onclick="bookSeat(8)">8</div>

    <div class="seat" id="seat-9" onclick="bookSeat(9)">9</div>

</div>

<!-- BARIS 4 -->
<div class="row">

    <div class="empty"></div>

    <div class="seat" id="seat-10" onclick="bookSeat(10)">10</div>

    <div class="seat" id="seat-11" onclick="bookSeat(11)">11</div>

    <div class="seat" id="seat-12" onclick="bookSeat(12)">12</div>

</div>

<!-- BARIS 5 -->
<div class="row">

    <div class="empty"></div>

    <div class="seat" id="seat-13" onclick="bookSeat(13)">13</div>

    <div class="seat" id="seat-14" onclick="bookSeat(14)">14</div>

    <div class="seat" id="seat-15" onclick="bookSeat(15)">15</div>

</div>

<!-- BARIS 6 -->
<div class="row">

    <div class="seat" id="seat-16" onclick="bookSeat(16)">16</div>

    <div class="seat" id="seat-17" onclick="bookSeat(17)">17</div>

    <div class="seat" id="seat-18" onclick="bookSeat(18)">18</div>

    <div class="seat" id="seat-19" onclick="bookSeat(19)">19</div>

</div>

</div>

<br>

<button onclick="cancelBooking()">
Batalkan Booking Saya
</button>

<div class="legend">

<p>
<span class="dot blue"></span> Kosong
</p>

<p>
<span class="dot red"></span> Dibooking Orang Lain
</p>

<p>
<span class="dot green"></span> Kursi Saya
</p>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>

// ======================
// FIREBASE CONFIG
// ======================

const firebaseConfig = {
  apiKey: "AIzaSyB-0vQfRqo8hg8Nnx9OjdupN8_QWuDAviM",
  authDomain: "booking-elf.firebaseapp.com",
  databaseURL: "https://booking-elf-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "booking-elf",
  storageBucket: "booking-elf.firebasestorage.app",
  messagingSenderId: "962719974645",
  appId: "1:962719974645:web:1a5d74ef571593f822b1bc",
  measurementId: "G-64KN3WGBCT"
};

// INIT FIREBASE
firebase.initializeApp(firebaseConfig);

const db = firebase.database();

let username = "";

// ======================
// SIMPAN NAMA
// ======================

function saveName(){

    const input = document.getElementById("nameInput").value.trim();

    if(input === ""){

        alert("Masukkan nama dulu");
        return;

    }

    username = input;

    alert("Halo " + username);

}

// ======================
// BOOKING KURSI
// ======================

function bookSeat(number){

    if(username === ""){

        alert("Masukkan nama dulu");
        return;

    }

    db.ref("seats").once("value", snapshot => {

        const data = snapshot.val() || {};

        // cek apakah user sudah booking
        for(let key in data){

            if(data[key].name === username){

                alert("Kamu sudah booking kursi " + key);
                return;

            }

        }

        // cek kursi sudah dipakai
        if(data[number]){

            alert("Kursi sudah dibooking oleh " + data[number].name);
            return;

        }

        // simpan booking
        db.ref("seats/" + number).set({
            name: username
        });

    });

}

// ======================
// BATALKAN BOOKING
// ======================

function cancelBooking(){

    if(username === ""){

        alert("Masukkan nama dulu");
        return;

    }

    db.ref("seats").once("value", snapshot => {

        const data = snapshot.val() || {};

        for(let key in data){

            if(data[key].name === username){

                db.ref("seats/" + key).remove();

                alert("Booking dibatalkan");

                return;

            }

        }

        alert("Kamu belum booking");

    });

}

// ======================
// REALTIME UPDATE
// ======================

db.ref("seats").on("value", snapshot => {

    const data = snapshot.val() || {};

    // reset semua kursi
    for(let i=1;i<=19;i++){

        const seat = document.getElementById("seat-" + i);

        if(seat){

            seat.innerHTML = i;

            seat.classList.remove("booked");
            seat.classList.remove("mine");

        }

    }

    // tampilkan data booking
    for(let key in data){

        const seat = document.getElementById("seat-" + key);

        if(seat){

            seat.innerHTML = data[key].name;

            if(data[key].name === username){

                seat.classList.add("mine");

            }else{

                seat.classList.add("booked");

            }

        }

    }

});

</script>

</body>
</html>
