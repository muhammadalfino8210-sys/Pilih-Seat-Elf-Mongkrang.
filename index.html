<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pilih Kursi ELF</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#111;
      color:white;
      text-align:center;
      padding:20px;
    }

    h1{
      margin-bottom:30px;
    }

    .bus{
      display:flex;
      flex-direction:column;
      gap:18px;
      align-items:center;
    }

    .row{
      display:flex;
      gap:12px;
      justify-content:center;
      width:100%;
    }

    .seat{
      width:70px;
      height:70px;
      background:#2ecc71;
      border-radius:12px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:bold;
      cursor:pointer;
      transition:0.2s;
    }

    .seat:hover{
      transform:scale(1.05);
    }

    .seat.selected{
      background:#f1c40f;
      color:black;
    }

    .seat.booked{
      background:#e74c3c;
      cursor:not-allowed;
    }

    .driver{
      background:#3498db;
    }

    .empty{
      width:70px;
      height:70px;
      visibility:hidden;
    }

    @media(max-width:600px){
      .seat,.empty{
        width:60px;
        height:60px;
        font-size:14px;
      }
    }
  </style>
</head>
<body>

<h1>Pilih Kursi ELF</h1>

<div class="bus">

  <!-- BARIS DEPAN -->
  <div class="row">
    <div class="seat">1</div>
    <div class="seat">2</div>
    <div class="seat driver">Supir</div>
  </div>

  <!-- BARIS 2 -->
  <div class="row">
    <div class="empty"></div>
    <div class="seat">3</div>
    <div class="seat">4</div>
    <div class="seat">5</div>
  </div>

  <!-- BARIS 3 -->
  <div class="row">
    <div class="seat">6</div>
    <div class="seat">7</div>
    <div class="seat">8</div>
    <div class="seat">9</div>
  </div>

  <!-- BARIS 4 -->
  <div class="row">
    <div class="empty"></div>
    <div class="seat">10</div>
    <div class="seat">11</div>
    <div class="seat">12</div>
  </div>

  <!-- BARIS 5 -->
  <div class="row">
    <div class="empty"></div>
    <div class="seat">13</div>
    <div class="seat">14</div>
    <div class="seat">15</div>
  </div>

  <!-- BARIS BELAKANG -->
  <div class="row">
    <div class="seat">16</div>
    <div class="seat">17</div>
    <div class="seat">18</div>
    <div class="seat">19</div>
  </div>

</div>

<script>

  const seats = document.querySelectorAll(".seat");

  seats.forEach(seat => {

    if(seat.classList.contains("driver")) return;

    seat.addEventListener("click", () => {

      if(seat.classList.contains("booked")) return;

      seat.classList.toggle("selected");
    });

  });

</script>

</body>
</html>
